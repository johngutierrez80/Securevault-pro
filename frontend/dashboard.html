<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureVault - Gestor de Contraseñas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <style>
      :root {
        --vault-primary: #0d6efd;
        --vault-success: #198754;
        --vault-danger: #dc3545;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f5f7fa 0%, #e4e9fd 100%);
      }

      .navbar-brand {
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .card {
        border: none;
        border-radius: 1rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .form-control:focus {
        border-color: var(--vault-primary);
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
      }

      .btn-success {
        padding: 0.65rem 1.5rem;
        font-weight: 500;
      }

      .password-cell {
        font-family: Consolas, "Courier New", monospace;
        letter-spacing: 0.5px;
      }

      .vault-pass-group .input-group-text,
      .vault-pass-group .btn,
      .vault-pass-group .form-control {
        border-radius: 0;
      }

      .vault-pass-group .form-control {
        background-color: #e9ecef;
      }

      .action-btn {
        width: 38px;
        height: 38px;
        padding: 0;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container-fluid px-4">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
          <i class="bi bi-shield-lock-fill fs-4"></i>
          SecureVault
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
          <span class="text-white-50 small">Bóveda personal</span>
          <button class="btn btn-outline-light btn-sm px-3" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i> Cerrar sesión
          </button>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-8">
          <div class="card mb-5">
            <div class="card-body p-4 p-md-5">
              <h4 class="card-title mb-4 d-flex align-items-center gap-2">
                <i class="bi bi-plus-circle-fill text-success"></i>
                Guardar nueva contraseña
              </h4>

              <div class="row g-3">
                <div class="col-md-5">
                  <label for="site" class="form-label fw-medium"
                    >Sitio / Aplicación</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-globe"></i
                    ></span>
                    <input
                      type="text"
                      id="site"
                      class="form-control"
                      placeholder="ej. netflix.com, gmail.com"
                      autocomplete="off"
                    />
                  </div>
                </div>

                <div class="col-md-5">
                  <label for="password" class="form-label fw-medium"
                    >Contraseña</label
                  >
                  <div class="input-group">
                    <span class="input-group-text"
                      ><i class="bi bi-key"></i
                    ></span>
                    <input
                      type="password"
                      id="password"
                      class="form-control"
                      placeholder="••••••••••••"
                      autocomplete="new-password"
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="togglePassword"
                    >
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                  <button class="btn btn-success w-100" onclick="save()">
                    <i class="bi bi-save me-1"></i> Guardar
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-header bg-white border-0 pt-4 pb-0 px-4 px-md-5">
              <h4 class="mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-safe2-fill text-primary"></i>
                Mi Vault
              </h4>
            </div>

            <div class="card-body p-4 p-md-5">
              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th scope="col">Sitio / Servicio</th>
                      <th scope="col">Contraseña</th>
                      <th scope="col" class="text-end">Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="list"></tbody>
                </table>
              </div>

              <div id="emptyState" class="text-center py-5 d-none">
                <i class="bi bi-safe text-muted" style="font-size: 4rem"></i>
                <p class="mt-3 text-muted">
                  Tu bóveda está vacía.<br />Comienza guardando tu primera
                  contraseña.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="js/main.js?v=20260315c"></script>
    <script>
      document
        .getElementById("togglePassword")
        ?.addEventListener("click", function () {
          const passwordInput = document.getElementById("password");
          const icon = this.querySelector("i");
          if (passwordInput.type === "password") {
            passwordInput.type = "text";
            icon.classList.replace("bi-eye", "bi-eye-slash");
          } else {
            passwordInput.type = "password";
            icon.classList.replace("bi-eye-slash", "bi-eye");
          }
        });
    </script>
  </body>
</html>
