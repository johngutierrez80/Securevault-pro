
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SecureVault • Iniciar Sesión</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<style>
		body {
			min-height: 100vh;
			background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
			background-attachment: fixed;
		}

		.login-container {
			max-width: 420px;
		}

		.card {
			background: rgba(30, 30, 50, 0.65);
			backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 1.25rem;
			box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
		}

		.form-control {
			background: rgba(50, 50, 80, 0.6);
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: white;
		}

		.form-control:focus {
			background: rgba(50, 50, 80, 0.8);
			border-color: #0d6efd;
			box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
			color: white;
		}

		.form-control::placeholder {
			color: rgba(255, 255, 255, 0.5);
		}

		.input-group-text {
			background: rgba(40, 40, 70, 0.7);
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: #adb5bd;
		}

		.btn-primary {
			background: linear-gradient(90deg, #0d6efd, #6610f2);
			border: none;
			font-weight: 500;
			padding: 0.75rem;
		}

		.btn-primary:hover {
			background: linear-gradient(90deg, #0b5ed7, #5a0ddb);
		}

		.brand-logo {
			font-size: 2.8rem;
			font-weight: 700;
			letter-spacing: -1px;
			background: linear-gradient(90deg, #0dcaf0, #6610f2);
			background-clip: text;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
		}

		.text-link {
			color: #0dcaf0;
			text-decoration: none;
		}

		.text-link:hover {
			color: #4dd4ff;
			text-decoration: underline;
		}

		#message {
			min-height: 1.5rem;
		}
	</style>
</head>
<body class="d-flex align-items-center">

	<div class="container login-container mx-auto px-3 py-5">

		<div class="text-center mb-5">
			<i class="bi bi-shield-lock-fill brand-logo"></i>
			<h2 class="fw-bold mt-2 mb-1">SecureVault</h2>
			<p class="text-secondary">Tu bóveda segura de contraseñas</p>
		</div>

		<div class="card p-4 p-md-5 shadow-lg">
			<div class="card-body">

				<h4 class="text-center mb-4 fw-semibold">Iniciar Sesión</h4>

				<form id="loginForm" onsubmit="event.preventDefault(); login();">
					<div class="mb-4">
						<label for="user" class="form-label fw-medium">Usuario o Email</label>
						<div class="input-group">
							<span class="input-group-text"><i class="bi bi-person"></i></span>
							<input
								type="text"
								id="user"
								class="form-control"
								placeholder="tu@correo.com o usuario"
								autocomplete="username"
								required
								minlength="1"
								maxlength="255"
								autofocus>
						</div>
					</div>

					<div class="mb-4">
						<label for="pass" class="form-label fw-medium">Contraseña</label>
						<div class="input-group">
							<span class="input-group-text"><i class="bi bi-key"></i></span>
							<input
								type="password"
								id="pass"
								class="form-control"
								placeholder="••••••••••••"
								autocomplete="current-password"
								required
								maxlength="72">
							<button class="btn btn-outline-secondary" type="button" id="togglePass">
								<i class="bi bi-eye"></i>
							</button>
						</div>
					</div>

					<div class="d-flex justify-content-between align-items-center mb-4 small">
						<div class="form-check">
							<input class="form-check-input" type="checkbox" id="remember" checked>
							<label class="form-check-label" for="remember">Recordarme</label>
						</div>
						<a href="#" class="text-link" onclick="forgotPassword(); return false;">¿Olvidaste tu contraseña?</a>
					</div>

					<button type="button" class="btn btn-primary w-100 mb-3" onclick="login()">
						<i class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión
					</button>

					<div class="text-center mt-4">
						<p class="text-secondary mb-2">¿Aún no tienes cuenta?</p>
						<button type="button" class="btn btn-outline-light btn-sm px-4" onclick="register()">
							Crear cuenta gratuita
						</button>
					</div>
				</form>

				<div id="message" class="mt-4 text-center fw-medium"></div>

			</div>
		</div>

		<div class="text-center mt-5 small text-secondary">
			<p>© 2026 SecureVault • Proyecto académico de Seguridad en Cloud y DevOps</p>
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
	<script src="js/main.js?v=20260315d"></script>
	<script>
		function forgotPassword() {
			const message = document.getElementById("message");
			if (!message) return;
			message.textContent = "Función no disponible en esta versión académica.";
			message.classList.remove("text-success");
			message.classList.add("text-danger");
		}

		document.getElementById("togglePass")?.addEventListener("click", function () {
			const input = document.getElementById("pass");
			const icon = this.querySelector("i");
			if (input.type === "password") {
				input.type = "text";
				icon.classList.replace("bi-eye", "bi-eye-slash");
			} else {
				input.type = "password";
				icon.classList.replace("bi-eye-slash", "bi-eye");
			}
		});
	</script>

</body>
</html>
