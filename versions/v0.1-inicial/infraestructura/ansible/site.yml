---
- name: Deploy SecureVault Pro stack
  hosts: securevault_nodes
  become: true
  tasks:
    - name: Ensure Docker is installed
      ansible.builtin.package:
        name: docker.io
        state: present

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Pull latest code
      ansible.builtin.git:
        repo: "https://github.com/example/securevault-pro.git"
        dest: /opt/securevault-pro
        version: main

    - name: Start stack with compose
      ansible.builtin.command: docker compose up -d --build
      args:
        chdir: /opt/securevault-pro
