name: SecureVault CI-CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  code-security:
    name: Code (SAST + secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [code-security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth-service image
        run: docker build -t securevault/auth-service:ci ./servicios/auth-service

      - name: Build vault-service image
        run: docker build -t securevault/vault-service:ci ./servicios/vault-service

      - name: Build worker-service image
        run: docker build -t securevault/worker-service:ci ./servicios/worker-service

      - name: Build frontend image
        run: docker build -t securevault/frontend-spa:ci ./frontend-spa

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        service:
          - servicios/auth-service
          - servicios/vault-service
          - servicios/worker-service
          - frontend-spa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: npm test --if-present

  trivy:
    name: Trivy
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy FS scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
