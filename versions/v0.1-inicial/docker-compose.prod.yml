version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  auth-service:
    build:
      context: ./servicios/auth-service
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  vault-service:
    build:
      context: ./servicios/vault-service
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SECRET_ENCRYPTION_KEY: ${SECRET_ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  worker-service:
    build:
      context: ./servicios/worker-service
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      CLEANUP_CRON: "*/10 * * * *"
    depends_on:
      - postgres
      - redis

  frontend-spa:
    build:
      context: ./frontend-spa
    environment:
      VITE_AUTH_API_URL: /api/auth
      VITE_VAULT_API_URL: /api/vault
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - vault-service

volumes:
  postgres_data:
