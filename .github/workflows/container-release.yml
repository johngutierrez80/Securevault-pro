name: Container Release

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  build-push-images:
    name: Build and Push (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    env:
      LOCAL_SCAN_IMAGE: local/${{ matrix.image_name }}:scan-${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: securevault-auth
            context: servicios/auth-service
            dockerfile: servicios/auth-service/Dockerfile
          - image_name: securevault-vault
            context: servicios/vault-service
            dockerfile: servicios/vault-service/Dockerfile
          - image_name: securevault-worker
            context: servicios/worker-service
            dockerfile: servicios/worker-service/Dockerfile
          - image_name: securevault-frontend
            context: frontend-spa
            dockerfile: frontend-spa/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag

      - name: Build local image for security scan
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          push: false
          tags: ${{ env.LOCAL_SCAN_IMAGE }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.25.0
        with:
          image-ref: ${{ env.LOCAL_SCAN_IMAGE }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Grype image scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.LOCAL_SCAN_IMAGE }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
