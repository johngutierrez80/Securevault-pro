name: CI DevSecOps

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write

jobs:
  python-quality-security:
    name: Python QA and Security (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            path: auth-service
          - service: vault
            path: vault-service
    defaults:
      run:
        working-directory: ${{ matrix.path }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ matrix.path }}/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit pip-audit

      - name: Syntax check
        run: python -m compileall app

      - name: Run unit tests if present
        shell: bash
        run: |
          if find tests -type f -name "test_*.py" | grep -q .; then
            pytest -q --cov=app --cov-report=term-missing --cov-report=xml
          else
            echo "No Python tests found in ${{ matrix.path }}"
          fi

      - name: Run Bandit SAST
        run: bandit -r app -iii

      - name: Run pip-audit SCA
        run: pip-audit -r requirements.txt

  frontend-quality-security:
    name: Frontend QA and Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-spa
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-spa/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build SPA
        run: npm run build

      - name: Run npm audit
        run: npm audit --audit-level=critical

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  dockerfile-lint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint auth Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: auth-service/Dockerfile

      - name: Lint vault Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: vault-service/Dockerfile

      - name: Lint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend-spa/Dockerfile

  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

  iac-checkov:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov on IaC and Compose files
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform,dockerfile,docker_compose,ansible
          quiet: true
          soft_fail: false
