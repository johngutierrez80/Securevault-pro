apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: securevault
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: vault
            - name: POSTGRES_PASSWORD
              value: vault
            - name: POSTGRES_DB
              value: vaultdb
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: securevault
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: securevault
spec:
  selector:
    app: auth
  ports:
    - port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: docker.io/johngutierrez80/securevault-auth:latest
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              value: postgresql://vault:vault@postgres:5432/vaultdb
            - name: SECRET_KEY
              value: securevaultsecret
            - name: ALGORITHM
              value: HS256
            - name: TOKEN_EXP_MINUTES
              value: "60"
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: securevault
spec:
  selector:
    app: vault
  ports:
    - port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: docker.io/johngutierrez80/securevault-vault:latest
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: postgresql://vault:vault@postgres:5432/vaultdb
            - name: SECRET_KEY
              value: securevaultsecret
            - name: ALGORITHM
              value: HS256
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: securevault
spec:
  type: NodePort
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: securevault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/johngutierrez80/securevault-frontend:latest
          ports:
            - containerPort: 80
