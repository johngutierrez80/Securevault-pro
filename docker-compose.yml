services:
  auth:
    build: ./servicios/auth-service
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy

  vault:
    build: ./servicios/vault-service
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./servicios/worker-service
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vaultdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vaultdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./frontend-spa
    ports:
      - "3000:80"
    depends_on:
      - auth
      - vault
