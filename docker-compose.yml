services:
  auth:
    image: docker.io/necromanoger/securevault-auth:${IMAGE_TAG:-v1.2.1}
    build: ./servicios/auth-service
    ports:
      - "8001:8001"
    environment:
      BOOTSTRAP_ADMIN_EMAIL: admin@securevault.local
      BOOTSTRAP_ADMIN_PASSWORD: AdminSecure123!@#
      REQUIRE_EMAIL_VERIFICATION: "true"
      MAILJET_API_KEY: "a28c61ed543502e4c7301558b361402d"
      MAILJET_SECRET_KEY: "90b1ac9731f55fb4ae809872b0763cf4"
      MAILJET_SENDER_EMAIL: "johngutierrez80@gmail.com"
      MAILJET_SENDER_NAME: "SecureVault Pro"
    depends_on:
      postgres:
        condition: service_healthy

  vault:
    image: docker.io/necromanoger/securevault-vault:${IMAGE_TAG:-v1.2.1}
    build: ./servicios/vault-service
    ports:
      - "8002:8002"
    environment:
      ENCRYPTION_KEY: "GmZ-xxg5FHVoxvS7hwsNOHYPgrlefsRIa74WRSZoYDc="
      AUTH_SESSION_VALIDATE_URL: "http://auth:8001/session/validate"
      MAILJET_API_KEY: "a28c61ed543502e4c7301558b361402d"
      MAILJET_SECRET_KEY: "90b1ac9731f55fb4ae809872b0763cf4"
      MAILJET_SENDER_EMAIL: "johngutierrez80@gmail.com"
      MAILJET_SENDER_NAME: "SecureVault Pro"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: docker.io/necromanoger/securevault-worker:${IMAGE_TAG:-v1.2.1}
    build: ./servicios/worker-service
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vaultdb
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault -d vaultdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    image: docker.io/necromanoger/securevault-frontend:${IMAGE_TAG:-v1.2.1}
    build: ./frontend-spa
    ports:
      - "3000:8080"
    depends_on:
      - auth
      - vault

volumes:
  pgdata:
  redisdata:
